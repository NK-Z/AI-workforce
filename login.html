<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Workforce — Sign In</title>
    <meta name="description" content="Sign in to your AI Workforce virtual office.">
    <meta name="theme-color" content="#6366f1">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="assets/icon-192.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .auth-container {
            width: 100%;
            max-width: 420px;
        }
        .auth-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            padding: 40px;
            box-shadow: var(--shadow-lg);
        }
        .auth-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: center;
            margin-bottom: 32px;
        }
        .auth-brand svg { width: 44px; height: 44px; }
        .auth-brand-text { font-size: 1.3rem; font-weight: 700; }
        .auth-title {
            text-align: center;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .auth-subtitle {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-bottom: 28px;
        }
        .auth-form .form-group { margin-bottom: 16px; }
        .auth-form .form-group label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-secondary);
        }
        .auth-form input {
            width: 100%;
            padding: 11px 14px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .auth-form input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
        }
        .auth-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.92rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s;
        }
        .auth-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(99,102,241,0.4); }
        .auth-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .auth-switch {
            text-align: center;
            margin-top: 20px;
            font-size: 0.84rem;
            color: var(--text-secondary);
        }
        .auth-switch a {
            color: var(--accent-primary);
            font-weight: 600;
            cursor: pointer;
        }
        .auth-error {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            color: #ef4444;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            font-size: 0.82rem;
            margin-bottom: 16px;
            display: none;
        }
        .auth-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            color: var(--text-muted);
            font-size: 0.78rem;
        }
        .auth-divider::before, .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }
        .api-config {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }
        .api-config summary {
            font-size: 0.78rem;
            color: var(--text-muted);
            cursor: pointer;
            margin-bottom: 10px;
        }
        .api-config .form-group { margin-bottom: 0; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-brand">
                <svg viewBox="0 0 40 40" fill="none">
                    <rect width="40" height="40" rx="10" fill="url(#bg)"/>
                    <path d="M12 20L18 14L24 20L18 26Z" fill="white" opacity="0.9"/>
                    <path d="M18 14L24 20L30 14L24 8Z" fill="white" opacity="0.6"/>
                    <defs><linearGradient id="bg" x1="0" y1="0" x2="40" y2="40">
                        <stop stop-color="#6366f1"/><stop offset="1" stop-color="#8b5cf6"/>
                    </linearGradient></defs>
                </svg>
                <span class="auth-brand-text">AI Workforce</span>
            </div>

            <!-- Login Form -->
            <div id="loginView">
                <h2 class="auth-title">Welcome back</h2>
                <p class="auth-subtitle">Sign in to your virtual office</p>
                <div class="auth-error" id="loginError"></div>
                <form class="auth-form" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" placeholder="you@company.com" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="auth-btn" id="loginBtn">Sign In</button>
                </form>
                <p class="auth-switch">
                    Don't have an account? <a onclick="showRegister()">Create one</a>
                </p>
            </div>

            <!-- Register Form -->
            <div id="registerView" style="display:none">
                <h2 class="auth-title">Create your office</h2>
                <p class="auth-subtitle">Set up your virtual AI workforce</p>
                <div class="auth-error" id="registerError"></div>
                <form class="auth-form" onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label>Your Name</label>
                        <input type="text" id="registerName" placeholder="Nasser" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="registerEmail" placeholder="you@company.com" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="registerPassword" placeholder="Min 6 characters" required minlength="6">
                    </div>
                    <button type="submit" class="auth-btn" id="registerBtn">Create Account</button>
                </form>
                <p class="auth-switch">
                    Already have an account? <a onclick="showLogin()">Sign in</a>
                </p>
            </div>

            <!-- API Server Config -->
            <details class="api-config">
                <summary>Server configuration</summary>
                <div class="form-group">
                    <label style="display:block; font-size:0.78rem; color:var(--text-muted); margin-bottom:6px;">Backend API URL</label>
                    <input type="url" id="apiUrlInput" placeholder="http://localhost:8000" style="width:100%; padding:8px 12px; background:var(--bg-tertiary); border:1px solid var(--border-color); border-radius:6px; color:var(--text-primary); font-size:0.82rem; outline:none;">
                    <button onclick="saveApiUrl()" style="margin-top:8px; padding:6px 14px; background:var(--bg-tertiary); border:1px solid var(--border-color); border-radius:6px; color:var(--text-primary); font-size:0.78rem; cursor:pointer;">Save & Reload</button>
                </div>
            </details>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        // If already logged in, go to main app
        if (API.isLoggedIn()) {
            window.location.href = 'index.html';
        }

        // Set current API URL in the config field
        document.getElementById('apiUrlInput').value = API.getApiUrl();

        function showRegister() {
            document.getElementById('loginView').style.display = 'none';
            document.getElementById('registerView').style.display = 'block';
        }

        function showLogin() {
            document.getElementById('loginView').style.display = 'block';
            document.getElementById('registerView').style.display = 'none';
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errEl = document.getElementById('loginError');
            errEl.style.display = 'none';
            btn.disabled = true;
            btn.textContent = 'Signing in...';

            try {
                await API.login(
                    document.getElementById('loginEmail').value,
                    document.getElementById('loginPassword').value,
                );
                window.location.href = 'index.html';
            } catch (err) {
                errEl.textContent = err.message;
                errEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('registerBtn');
            const errEl = document.getElementById('registerError');
            errEl.style.display = 'none';
            btn.disabled = true;
            btn.textContent = 'Creating account...';

            try {
                await API.register(
                    document.getElementById('registerEmail').value,
                    document.getElementById('registerPassword').value,
                    document.getElementById('registerName').value,
                );
                window.location.href = 'index.html';
            } catch (err) {
                errEl.textContent = err.message;
                errEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        }

        function saveApiUrl() {
            const url = document.getElementById('apiUrlInput').value.trim();
            if (url) API.setApiUrl(url);
        }
    </script>
</body>
</html>
